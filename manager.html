<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manager — Insy Reception</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --tp:#5a2d82;--tpl:#5a2d82;--tg:#c9a84c;--tgg:#b8912e;
  --bg:#f4f0fa;--white:#fff;--border:#e2d8f0;--muted:#7a6a8a;--td:#1a0a2e;
  --tpp:#ece4f5;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--td);min-height:100vh}
.nav{background:var(--tp);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:600;color:#fff;letter-spacing:.01em}
.nav-logo span{color:#C9A84C}
.nav-meta{font-size:11px;color:rgba(255,255,255,.5)}
.nav-salon{font-size:13px;font-weight:600;color:rgba(255,255,255,.9)}
.main{max-width:100%;margin:0 auto;padding:24px 0 24px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.main{grid-template-columns:1fr;padding:12px}}
.card{background:var(--white);border:1.5px solid var(--border);border-radius:12px;padding:18px;box-shadow:0 2px 8px rgba(74,28,107,.05)}
.card-title{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--tpl);font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.card-title svg{flex-shrink:0}
.ticker-table{width:100%;border-collapse:collapse;font-size:13px}.ticker-table th{background:var(--tpp);color:var(--tpl);font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:2px solid var(--border);white-space:nowrap}.ticker-table td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}.ticker-table tr:last-child td{border-bottom:none}.ticker-table tr:hover td{background:var(--bg)}
.ticker-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ticker-dot.in{background:#27ae60}
.ticker-dot.cancel{background:#e74c3c}
.ticker-dot.move{background:#f39c12}
.upcoming-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border)}
.upcoming-row:last-child{border-bottom:none}
.upcoming-date{font-size:12px;font-weight:600;color:var(--tpl);width:90px;flex-shrink:0}
.upcoming-info{flex:1;min-width:0}
.upcoming-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upcoming-service{font-size:11px;color:var(--muted)}
.upcoming-staff{font-size:11px;color:var(--tg);font-weight:500;flex-shrink:0}
.wa-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.wa-row:last-child{border-bottom:none}
.wa-info{flex:1;min-width:0}
.wa-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wa-detail{font-size:11px;color:var(--muted);margin-top:1px}
.wa-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;background:#25D366;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;flex-shrink:0;white-space:nowrap}
.wa-btn:hover{background:#20bc59}
.wa-btn svg{flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge.in{background:#e8f8ee;color:#1e7a3c}
.badge.cancel{background:#fef2f2;color:#c0392b}
.badge.move{background:#fff8e8;color:#a07800}
.span-full{grid-column:1/-1}
.loading{color:var(--muted);font-size:13px;padding:16px 0;text-align:center}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{width:7px;height:7px;border-radius:50%;background:#27ae60;display:inline-block;animation:pulse 2s infinite;flex-shrink:0}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">Insy <span>Reception</span></div>
  <div style="text-align:right">
    <div class="nav-salon" id="nav-salon-name">Manager</div>
    <div class="nav-meta">Dashboard</div>
  </div>
</nav>

<div class="main">

  <!-- Zeile 1: Nächste Termine links (40%) + Live-Aktivitäten rechts (60%) — gleiche Höhe -->
  <div style="grid-column:1/-1;display:flex;gap:16px;align-items:stretch">

    <!-- Nächste Termine — 22% links -->
    <div class="card" style="width:22%;flex-shrink:0">
      <div class="card-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Nächste Termine
      </div>
      <div id="upcoming-list" style="max-height:400px;overflow-y:auto"><div class="loading">Wird geladen…</div></div>
    </div>

    <!-- Live-Aktivitäten — Rest rechts, bis zum Rand -->
    <div class="card" style="flex:1;border-radius:12px 0 0 12px;margin-right:0">
      <div class="card-title">
        <span class="live-dot"></span>
        Live-Aktivitäten
        <span id="ticker-count" style="margin-left:auto;font-size:10px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0"></span>
      </div>
      <div id="ticker-list" style="max-height:400px;overflow-y:auto"><div class="loading">Wird geladen…</div></div>
    </div>

  </div>

  <!-- Zeile 2: Terminbestätigung | Terminerinnerung | Stornos nebeneinander -->
  <div style="grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">

    <!-- ④ Terminbestätigungen -->
    <div class="card">
      <div class="card-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Terminbestätigung senden
        <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <span style="font-size:9px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Kurzfristige:</span>
          <select id="kurzfristig-setting" onchange="saveKurzfristigSetting(this.value)"
            style="font-size:9px;border:1px solid var(--border);border-radius:4px;padding:2px 5px;background:var(--bg);color:var(--text);cursor:pointer;font-weight:500">
            <option value="keine">Nicht anzeigen</option>
            <option value="anzeigen">Anzeigen</option>
          </select>
        </span>
      </div>
      <div id="confirm-list" style="max-height:350px;overflow-y:auto"><div class="loading">Wird geladen…</div></div>
    </div>

    <!-- ③ Terminerinnerungen -->
    <div class="card">
      <div class="card-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        Terminerinnerung senden
        <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
          <span style="font-size:9px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Kurzfristige:</span>
          <select id="kurzfristig-reminder-setting" onchange="saveKurzfristigReminderSetting(this.value)"
            style="font-size:9px;border:1px solid var(--border);border-radius:4px;padding:2px 5px;background:var(--bg);color:var(--text);cursor:pointer;font-weight:500">
            <option value="keine">Nicht anzeigen</option>
            <option value="anzeigen">Anzeigen</option>
          </select>
        </span>
      </div>
      <div id="reminder-list" style="max-height:350px;overflow-y:auto"><div class="loading">Wird geladen…</div></div>
    </div>

    <!-- ⑤ Stornos -->
    <div class="card" id="storno-section">
      <div class="card-title">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#e74c3c" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        <span style="color:#e74c3c">Stornos</span>
        <span style="margin-left:auto;font-size:9px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0">Letzte 7 Tage</span>
      </div>
      <div id="storno-list" style="max-height:350px;overflow-y:auto"><div class="loading">Wird geladen…</div></div>
    </div>

  </div>

</div>

<script>
const SUPABASE_URL='https://uzemgxfjgjwqfgfwbboi.supabase.co';
const SUPABASE_KEY='sb_publishable__XubcF5yPDyIMpfE7kO9Rg_Xp7kj0hL';
var varianteMap={};
var staffMap={};
var serviceMap={};

const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
  global:{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}}
});

function getSalonId(){
  return new URLSearchParams(window.location.search).get('salon_id')||'7ae1d846-097f-4cfd-bd4b-d2663551cb11';
}
const SALON_ID=getSalonId();

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmt(dt){var d=new Date(dt);return d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function waLink(phone,msg){var clean=(phone||'').replace(/\D/g,'');if(clean.startsWith('0'))clean='49'+clean.slice(1);return'https://wa.me/'+clean+'?text='+encodeURIComponent(msg);}

async function loadAll(){
  var salonRes=await sb.from('kunden_profile').select('brand_name,name').eq('id',SALON_ID).single();
  if(salonRes.data){document.getElementById('nav-salon-name').textContent=salonRes.data.brand_name||salonRes.data.name||'Salon';}

  var now=new Date();
  var nowIso=now.toISOString();
  var todayStr=nowIso.slice(0,10);
  var tomorrow=new Date(now);tomorrow.setDate(now.getDate()+1);
  var dayAfter=new Date(now);dayAfter.setDate(now.getDate()+2);
  var sevenDaysAgo=new Date(now);sevenDaysAgo.setDate(now.getDate()-7);

  var allRes=await sb.from('bookings')
    .select('id,created_at,updated_at,cancelled_at,customer_name,customer_phone,termin_start,termin_ende,status,mitarbeiter_id,service_variante_id,kunde_id')
    .eq('kunde_id',SALON_ID)
    .order('created_at',{ascending:false})
    .limit(100);

  if(allRes.error){console.error('Bookings error:',JSON.stringify(allRes.error));return;}
  var all=allRes.data||[];

  varianteMap={};staffMap={};serviceMap={};
  var varIds=[...new Set(all.map(function(b){return b.service_variante_id;}).filter(Boolean))];
  var staffIds=[...new Set(all.map(function(b){return b.mitarbeiter_id;}).filter(Boolean))];

  await Promise.all([
    varIds.length?sb.from('service_varianten').select('id,service_name,dauer_minuten,preis,service_id').in('id',varIds).then(function(r){
      if(r.data){
        r.data.forEach(function(v){varianteMap[v.id]=v;});
        var svcIds=[...new Set(r.data.map(function(v){return v.service_id;}).filter(Boolean))];
        if(svcIds.length)return sb.from('services').select('id,name').in('id',svcIds).then(function(sr){
          if(sr.data)sr.data.forEach(function(s){serviceMap[s.id]=s.name;});
        });
      }
    }):Promise.resolve(),
    staffIds.length?sb.from('mitarbeiter').select('id,display_name,name,avatar_url,farbe').in('id',staffIds).then(function(r){
      if(r.data)r.data.forEach(function(s){staffMap[s.id]=s;});
    }):Promise.resolve()
  ]);

  var ticker=all.slice(0,10);
  var upcoming=all.filter(function(b){return b.status!=='cancelled'&&new Date(b.termin_start)>now;}).sort(function(a,b){return new Date(a.termin_start)-new Date(b.termin_start);}).slice(0,15);
  var reminders=all.filter(function(b){
    var d=b.termin_start?b.termin_start.slice(0,10):'';
    return b.status!=='cancelled'&&d>=tomorrow.toISOString().slice(0,10)&&d<=dayAfter.toISOString().slice(0,10);
  });
  var reminderIds=reminders.map(function(b){return b.id;});
  var kurzfristigReminderSetting=localStorage.getItem('kurzfristig_reminder_setting')||'anzeigen';
  if(kurzfristigReminderSetting==='keine'){
    reminders=reminders.filter(function(b){
      var bookedDay=b.created_at?b.created_at.slice(0,10):'';
      return bookedDay<todayStr;
    });
  }
  var kurzfristigSetting=localStorage.getItem('kurzfristig_setting')||'anzeigen';
  var confirms=all.filter(function(b){
    if(b.status==='cancelled')return false;
    if(new Date(b.termin_start)<=now)return false;
    if(reminderIds.indexOf(b.id)>=0)return false;
    if(kurzfristigSetting==='keine'){var bookedDay=b.created_at?b.created_at.slice(0,10):'';if(bookedDay>=todayStr)return false;}
    return true;
  });
  var stornos=all.filter(function(b){
    return b.status==='cancelled'&&new Date(b.updated_at||b.created_at)>=sevenDaysAgo;
  }).slice(0,10);

  renderTicker(ticker,varianteMap,staffMap);
  renderUpcomingCalendar(upcoming,varianteMap,staffMap,serviceMap);
  renderReminders(reminders);
  window._lastReminderData=reminders;
  renderConfirm(confirms);
  window._lastConfirmData=confirms;
  renderStorno(stornos,varianteMap,staffMap,serviceMap);
  window._lastStornoData={rows:stornos,varianteMap:varianteMap,staffMap:staffMap,serviceMap:serviceMap};
}

function renderUpcomingCalendar(events,varianteMap,staffMap,serviceMap){
  serviceMap=serviceMap||{};varianteMap=varianteMap||{};staffMap=staffMap||{};
  var el=document.getElementById('upcoming-list');
  if(!events.length){el.innerHTML='<div class="loading">Keine bevorstehenden Termine</div>';return;}
  el.innerHTML=events.map(function(b){
    var d=new Date(b.termin_start);
    var dateStr=d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    var variante=varianteMap[b.service_variante_id];
    var svcParent2=variante&&variante.service_id?serviceMap[variante.service_id]||'':'';
    var svcName=variante?[svcParent2,variante.service_name].filter(Boolean).join(' · ')||'–':'–';
    var staffObj=staffMap[b.mitarbeiter_id]||null;
    var staffName=staffObj?(staffObj.display_name||staffObj.name||'–'):'–';
    var successUrl='https://insy-reception.com/success?salon_id='+SALON_ID+'&booking_id='+b.id;
    return'<div class="upcoming-row">'+
      '<div class="upcoming-date">'+esc(dateStr)+'</div>'+
      '<div class="upcoming-info"><div class="upcoming-name">'+esc(b.customer_name||'Kunde')+'</div><div class="upcoming-service">'+esc(svcName)+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0;width:110px">'+renderAvatar(staffObj,36)+'<span class="upcoming-staff" style="color:var(--tg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(staffName)+'</span></div>'+
      '<a href="'+successUrl+'" target="_blank" style="flex-shrink:0;width:28px;height:28px;display:inline-flex;align-items:center;justify-content:center;background:#5a2d82;border:1px solid #5a2d82;color:#fff;font-weight:700;box-shadow:0 0 8px #5a2d8299;border-radius:6px;font-size:12px;text-decoration:none;">↗</a>'+
    '</div>';
  }).join('');
}

function renderAvatar(staffObj,size){
  if(!staffObj)return'';
  var name=typeof staffObj==='string'?staffObj:(staffObj.display_name||staffObj.name||'?');
  var ini=name.charAt(0).toUpperCase();
  if(staffObj.avatar_url){
    return'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background-image:url('+staffObj.avatar_url+');background-size:cover;background-position:center;flex-shrink:0;display:inline-block"></div>';
  }
  var color=staffObj.farbe||'#5a2d82';
  return'<div style="width:'+size+'px;height:'+size+'px;border-radius:50%;background:'+color+';display:inline-flex;align-items:center;justify-content:center;font-size:'+(size*0.4)+'px;font-weight:600;color:#fff;flex-shrink:0">'+ini+'</div>';
}

function renderTicker(rows,varianteMap,staffMap){
  varianteMap=varianteMap||{};staffMap=staffMap||{};
  var el=document.getElementById('ticker-list');
  var cnt=document.getElementById('ticker-count');
  if(cnt)cnt.textContent=rows.length+' Einträge';
  if(!rows.length){el.innerHTML='<div class="loading">Noch keine Aktivitäten</div>';return;}
  window._tickerRows=rows;window._tickerVarianteMap=varianteMap;window._tickerStaffMap=staffMap;
  var erledigtIds=JSON.parse(localStorage.getItem('erledigt_ids')||'[]');
  var thead='<thead><tr>'
    +'<th style="width:14px"></th>'
    +'<th>Name</th>'
    +'<th style="font-size:12px;width:110px">Telefon</th>'
    +'<th>Service</th>'
    +'<th style="width:60px">Dauer</th>'
    +'<th style="width:60px">Preis</th>'
    +'<th style="width:130px">Mitarbeiter</th>'
    +'<th style="width:120px">Termin</th>'
    +'<th style="font-size:12px;width:110px">Status</th>'
    +'<th style="font-size:12px;width:360px">Aktionen</th>'
  +'</tr></thead>';
  var tbody=rows.map(function(b){
    var type=b.status==='cancelled'?'cancel':b.status==='rescheduled'?'move':'in';
    var typeLabel=type==='cancel'?'Storno':type==='move'?'Verschoben':'Eingang';
    var d=new Date(b.termin_start||b.created_at||new Date());
    var dateStr=d.toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    var bookStr=type==='cancel'&&b.cancelled_at
      ?new Date(b.cancelled_at).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+' '+new Date(b.cancelled_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})
      :new Date(b.created_at).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'})+' '+new Date(b.created_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    var variante=varianteMap[b.service_variante_id];
    var svcParent=variante&&variante.service_id?serviceMap[variante.service_id]||'':'';
    var svcName=variante?[svcParent,variante.service_name].filter(Boolean).join(' · ')||'–':'–';
    var dur=variante&&variante.dauer_minuten?variante.dauer_minuten+' Min':'–';
    var price=variante&&variante.preis?variante.preis+' €':'–';
    var staffObj=staffMap[b.mitarbeiter_id]||null;
    var staffName=esc(staffObj?(staffObj.display_name||staffObj.name||'–'):'–');
    var phone=b.customer_phone||'';
    var bookingLink='https://insy-reception.com/success?salon_id='+SALON_ID+'&booking_id='+b.id;
    var termin=d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'})+' um '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' Uhr';
    var msgBestaetigung='Hallo '+(b.customer_name||'')+'!\nDein Termin am '+termin+' ist bestätigt. Bis dann!\n\nDein Link zur Buchung: '+bookingLink+'\npowered by insy-reception';
    var msgErinnerung='Hallo '+(b.customer_name||'')+'!\nErinnerung: Dein Termin ist am '+termin+'. Wir freuen uns auf dich!\n\nDein Link zur Buchung: '+bookingLink+'\npowered by insy-reception';
    var msgStorno='Hallo '+(b.customer_name||'')+'!\nWir haben deine Stornierung für den '+termin+' erhalten und bestätigen diese hiermit.\n\nFalls du einen neuen Termin buchen möchtest:\n'+bookingLink+'\npowered by insy-reception';
    var isErledigt=erledigtIds.indexOf(b.id)>=0;
    var now2=new Date();
    var todayStr2=now2.toISOString().slice(0,10);
    var tomorrowStr=new Date(now2.getFullYear(),now2.getMonth(),now2.getDate()+1).toISOString().slice(0,10);
    var dayAfterStr=new Date(now2.getFullYear(),now2.getMonth(),now2.getDate()+2).toISOString().slice(0,10);
    var terminDay=b.termin_start?b.termin_start.slice(0,10):'';
    var kurzfristigSetting2=localStorage.getItem('kurzfristig_setting')||'anzeigen';
    var kurzfristigReminderSetting2=localStorage.getItem('kurzfristig_reminder_setting')||'anzeigen';
    var bookedToday=b.created_at&&b.created_at.slice(0,10)>=todayStr2;

    // Erinnerung: genau gleiche Bedingung wie reminders-Kachel
    var isInReminder=type!=='cancel'&&(terminDay===tomorrowStr||terminDay===dayAfterStr)&&!(kurzfristigReminderSetting2==='keine'&&bookedToday);
    // Bestätigung: genau gleiche Bedingung wie confirms-Kachel (nicht in reminder, zukünftig)
    var isInConfirm=type!=='cancel'&&new Date(b.termin_start)>now2&&!isInReminder&&!(kurzfristigSetting2==='keine'&&bookedToday);
    // Storno: genau gleiche Bedingung wie stornos-Kachel
    var isInStorno=type==='cancel'&&new Date(b.updated_at||b.created_at)>=new Date(now2.getTime()-7*24*60*60*1000);

    var canBestaetigen=isInConfirm&&!!phone;

function tickerErledigt(id){
  var ids=JSON.parse(localStorage.getItem('erledigt_ids')||'[]');
  var idx=ids.indexOf(id);

}
