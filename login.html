<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insy · Anmelden</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--tp:#4a1c6b;--tpl:#6b3fa0;--tpp:#f0eaf7;--tg:#c9a84c;--td:#1a0a2e;--border:#e8e0f0;--muted:#7a6a8a;}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'DM Sans',system-ui,sans-serif;background:var(--tp);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo-label{font-size:10px;letter-spacing:.2em;color:var(--tg);font-weight:600;text-transform:uppercase}
.logo-name{font-size:26px;font-weight:600;color:#fff;margin-top:6px}
.logo-sub{font-size:13px;color:rgba(255,255,255,.5);margin-top:6px}
.card{background:#fff;border-radius:16px;padding:36px 32px;width:100%;max-width:380px;text-align:center}
.card-title{font-size:16px;font-weight:600;color:var(--td);margin-bottom:6px}
.card-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:28px}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 20px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);font-family:inherit;background:#fff;color:var(--td);transition:all .15s;}
.btn-google:hover{border-color:var(--tpl);background:var(--tpp);transform:translateY(-1px);box-shadow:0 4px 12px rgba(74,28,107,.12)}
.btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none}
.error{font-size:12px;color:#c0392b;margin-top:12px;min-height:16px}
.note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:20px}
.note a{color:var(--tpl);text-decoration:none}
</style>
</head>
<body>

<div class="logo">
  <div class="logo-label">Insy Reception</div>
  <div class="logo-name">Willkommen</div>
  <div class="logo-sub">Melde dich mit deinem Google Account an</div>
</div>

<div class="card">
  <div class="card-title">Anmelden · Registrieren</div>
  <div class="card-sub">Nutze deinen Google Account — kein Passwort nötig.<br>Neuer Account wird automatisch erstellt.</div>

  <button class="btn-google" onclick="doGoogleLogin()" id="btn-google">
    <svg width="18" height="18" viewBox="0 0 24 24">
      <path d="M21.05 11.1H12v2.8h5.15c-.22 1.17-.9 2.17-1.9 2.83v2.35h3.07c1.8-1.65 2.83-4.1 2.83-7z" fill="#4285F4"/>
      <path d="M12 21c2.59 0 4.76-.86 6.35-2.32l-3.07-2.35c-.85.57-1.95.91-3.28.91-2.52 0-4.66-1.7-5.42-3.98H3.43v2.43C5.01 18.98 8.27 21 12 21z" fill="#34A853"/>
      <path d="M6.58 13.26A5.98 5.98 0 016.2 12c0-.44.07-.87.18-1.28V8.3H3.43A9.97 9.97 0 002 12c0 1.61.39 3.13 1.07 4.46l3.08-2.43z" fill="#FBBC04"/>
      <path d="M12 6.04c1.42 0 2.7.49 3.7 1.44l2.77-2.77C16.75 3.12 14.58 2 12 2 8.27 2 5.01 4.02 3.43 7.04L6.5 9.47c.76-2.28 2.9-3.43 5.5-3.43z" fill="#EA4335"/>
    </svg>
    Mit Google anmelden
  </button>

  <div class="error" id="error-msg"></div>

  <div class="note">Mit der Anmeldung stimmst du unseren <a href="#">Nutzungsbedingungen</a> und der <a href="#">Datenschutzerklärung</a> zu.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb=window.supabase.createClient(
  'https://uzemgxfjgjwqfgfwbboi.supabase.co',
  'sb_publishable__XubcF5yPDyIMpfE7kO9Rg_Xp7kj0hL'
);
async function doGoogleLogin(){
  var btn=document.getElementById('btn-google');
  btn.disabled=true;btn.textContent='Weiterleitung…';
  var res=await sb.auth.signInWithOAuth({
    provider:'google',
    options:{
      redirectTo:'https://insy-reception.com/configuration.html',
      queryParams:{access_type:'offline',prompt:'consent'}
    }
  });
  if(res.error){
    document.getElementById('error-msg').textContent=res.error.message;
    btn.disabled=false;btn.textContent='Mit Google anmelden';
  }
}
</script>
</body>
</html>
