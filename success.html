<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buchung bestätigt · Insy Reception</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f3f0f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.card{
  background:var(--tp,#4a1c6b);
  border-radius:20px;
  padding:40px 36px;
  max-width:440px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 60px rgba(74,28,107,0.25);
  position:relative;
  overflow:hidden;
}

/* booking-style header */
.hd{background:linear-gradient(135deg,#3d1568 0%,#5a2d82 60%,#4a1f72 100%);padding:14px 20px;width:100%;position:relative;border-radius:20px 20px 0 0;margin:-40px -36px 24px;width:calc(100% + 72px)}
.hd-inner{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.hd-left{flex:1;min-width:0}
.hd-logo{font-family:'Playfair Display',serif;font-size:0.65rem;font-weight:600;color:#fff;letter-spacing:.16em;text-transform:uppercase;line-height:1;margin-bottom:3px}
.hd-logo span{color:#C9A84C}
.hd-name{font-size:18px;font-weight:600;color:#fff;margin-bottom:5px;line-height:1.2}
.hd-meta{display:flex;flex-direction:column;gap:5px}
.hd-meta-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hd-chip{font-size:12px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:5px}
.hd-hours-inline{cursor:pointer;position:relative;user-select:none}
.hd-hours-inline:hover{color:rgba(255,255,255,.82)}
.hd-hours-drop{position:absolute;top:calc(100% + 6px);left:0;background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;padding:10px 14px;min-width:200px;z-index:300;box-shadow:0 4px 16px rgba(74,28,107,.12);display:none}
.hd-hour-row{display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#7a6a8a;padding:3px 0}
.hd-hour-today{color:#3d1568;font-weight:600}
.hd-hour-closed{color:#c8bcd8}

/* Check */
.check-wrap{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,0.35),rgba(201,168,76,0.15));border:2px solid rgba(201,168,76,0.55);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

.conf-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:20px}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:24px}
.pill{display:inline-flex;align-items:center;font-size:12px;padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.12);color:#fff}
.pill.gold{background:rgba(201,168,76,.2);color:#e8d08a;border:1px solid rgba(201,168,76,.3)}

/* Details */
.details{background:rgba(0,0,0,.15);border-radius:12px;padding:14px 16px;margin-bottom:24px;text-align:left}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.detail-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.06)}
.detail-label{color:rgba(255,255,255,.45)}
.detail-value{color:#fff;font-weight:500;text-align:right}


.cal-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.35);border-radius:10px;padding:10px 20px;font-size:13px;color:#e8d08a;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;margin-top:12px}
.cal-btn:hover{background:rgba(201,168,76,.25);border-color:rgba(201,168,76,.6)}
/* Cancel Button */
.cancel-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:#e74c3c;border:1.5px solid #e74c3c;
  border-radius:10px;padding:10px 20px;
  font-size:13px;color:#fff;font-weight:600;
  cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.cancel-btn:hover{background:#c0392b;border-color:#c0392b;}

/* New booking link */
.new-link{display:block;margin-top:14px;font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;}
.new-link:hover{color:rgba(255,255,255,.7);}

@media(max-width:480px){
  .card{padding:28px 20px}
  .salon-chips{gap:8px}
}
</style>
</head>
<body>

<div class="card" id="conf-card">

  <!-- Header identisch wie booking.html mobile -->
  <div class="hd">
    <div class="hd-inner">
      <div class="hd-left">
        <div class="hd-logo" id="brand-name">Insy <span>Reception</span></div>
        <div class="hd-name" id="salon-name">Salonname</div>
        <div class="hd-meta">
          <!-- Reihe 1: Adresse + Telefon -->
          <div class="hd-meta-row">
            <a class="hd-chip" id="salon-address" href="#" style="display:none;text-decoration:none;color:rgba(255,255,255,.65);cursor:default"></a>
            <div class="hd-chip" id="salon-phone" style="display:none"></div>
            <a class="hd-chip" id="salon-mobile-link" href="#" style="display:none;text-decoration:none;color:rgba(255,255,255,.65)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              <span id="salon-mobile-label">Mobil</span>
            </a>
          </div>
          <!-- Reihe 2: Links -->
          <div class="hd-meta-row" id="hd-links-row" style="display:none">
            <a class="hd-chip" id="salon-instagram" href="#" target="_blank" style="display:none;text-decoration:none;color:rgba(255,255,255,.55)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg>
              Instagram
            </a>
            <a class="hd-chip" id="salon-website" href="#" target="_blank" style="display:none;text-decoration:none;color:rgba(255,255,255,.55)">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>
              Website
            </a>
          </div>
          <!-- Öffnungszeiten aufklappbar -->
          <div class="hd-meta-row">
            <div class="hd-chip hd-hours-inline" id="hours-pill" onclick="toggleHours()">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <span id="hd-hours-status" style="font-weight:600">—</span>
              <span id="today-hours-label"> ▾</span>
              <div class="hd-hours-drop" id="hours-drop"></div>
            </div>
          </div>
          <!-- Bemerkung/Hinweis -->
          <div id="hd-note" style="display:none;margin-top:7px;padding:5px 12px;background:rgba(255,255,255,0.12);border-radius:8px;font-size:11px;color:rgba(255,255,255,0.85);align-items:flex-start;gap:6px;word-break:break-word;line-height:1.5;width:fit-content">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;margin-top:2px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="hd-note-text" style="flex:1;min-width:0"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bestätigung -->
  <div class="check-wrap">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="conf-title">Buchung bestätigt!</div>

  <!-- Termin-Details -->
  <div class="details" id="booking-details">
    <div class="detail-row"><span class="detail-label">Service</span><span class="detail-value" id="d-service">—</span></div>
    <div class="detail-row" id="d-staff-row"><span class="detail-label">bei</span><span class="detail-value" id="d-staff">—</span></div>
    <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="d-date">—</span></div>
    <div class="detail-row"><span class="detail-label">Uhrzeit</span><span class="detail-value" id="d-time">—</span></div>
  </div>

  <!-- Kalender + Aktionen -->
  <div id="cal-btns" style="display:none;margin-top:16px;display:flex;flex-direction:column;align-items:flex-start;gap:10px">
    <a id="cal-google" href="#" target="_blank" style="display:inline-flex;align-items:center;gap:10px;background:#fff;border:1px solid #dadce0;border-radius:8px;padding:10px 16px;font-size:14px;font-weight:500;color:#3c4043;cursor:pointer;text-decoration:none;font-family:'Google Sans',Arial,sans-serif;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:box-shadow .2s" onmouseover="this.style.boxShadow='0 2px 8px rgba(0,0,0,.2)'" onmouseout="this.style.boxShadow='0 1px 3px rgba(0,0,0,.12)'">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M45.5 24.5c0-1.4-.1-2.8-.4-4.1H24v7.8h12.1c-.5 2.8-2.1 5.2-4.4 6.8v5.6h7.1c4.2-3.8 6.7-9.5 6.7-16.1z"/><path fill="#34A853" d="M24 46c6.5 0 11.9-2.1 15.8-5.8l-7.1-5.6c-2.2 1.5-5 2.3-8.7 2.3-6.7 0-12.4-4.5-14.4-10.6H2.2v5.8C6.1 40.9 14.4 46 24 46z"/><path fill="#FBBC05" d="M9.6 26.3c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8v-5.8H2.2C.8 13.8 0 17.8 0 22s.8 8.2 2.2 11.1l7.4-6.8z"/><path fill="#EA4335" d="M24 8.8c3.8 0 7.1 1.3 9.8 3.9l7.3-7.3C36.9 1.8 31.5 0 24 0 14.4 0 6.1 5.1 2.2 12.9l7.4 5.8C11.6 13.3 17.3 8.8 24 8.8z"/></svg>
      In Kalender speichern
    </a>
    <a class="new-link" id="new-booking-link" href="#" style="display:inline-flex;background:#2e8b57;color:#fff;border:1.5px solid #2e8b57;border-radius:10px;padding:10px 22px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s" onmouseover="this.style.background='#256e46'" onmouseout="this.style.background='#2e8b57'">Neuen Termin buchen</a>
    <div style="width:100%;display:flex;justify-content:flex-start">
      <button id="cancel-btn" onclick="cancelBooking()" style="display:inline-flex;align-items:center;gap:6px;background:#c0392b;border:1.5px solid #c0392b;border-radius:10px;padding:7px 16px;font-size:11px;color:#fff;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s" onmouseover="this.style.background='#a93226';this.style.borderColor='#a93226'" onmouseout="this.style.background='#c0392b';this.style.borderColor='#c0392b'">Termin stornieren</button>
    </div>
    <p style="font-size:10px;color:rgba(255,255,255,.3);margin-top:14px;line-height:1.5;text-align:center">Ein neuer Termin kann erst gebucht werden, nachdem der aktuelle Termin storniert wurde oder abgelaufen ist.</p>
  </div>

  <!-- Hintergrund Wasserzeichen -->
  <div style="display:none" id="watermark"></div>
</div>

<script>
var sb=null;
var params=new URLSearchParams(window.location.search);
var salonId=params.get('salon_id');
var bookingId=params.get('booking_id');
var googleEventId=params.get('google_event_id');
var svcNames=params.get('services')||'—';
var staffName=params.get('staff')||'—';
var date=params.get('date')||'—';
var time=params.get('time')||'—';
var price=params.get('price');

// Supabase
var SURL='https://uzemgxfjgjwqfgfwbboi.supabase.co';
var SKEY='sb_publishable__XubcF5yPDyIMpfE7kO9Rg_Xp7kj0hL';

async function init(){
  // Buchungsdetails — immer aus Supabase nachladen wenn bookingId vorhanden
  var needsLoad = !!bookingId;

  if(needsLoad){
    try{
      var bRes=await fetch(SURL+'/rest/v1/bookings?id=eq.'+bookingId+'&select=*',{
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
      });
      var bData=await bRes.json();
      if(bData&&bData[0]){
        var b=bData[0];
        // termin_start → date + time
        if(b.termin_start){
          var d=new Date(b.termin_start);
          date=d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
          time=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        }
        // service_variante_id → full service name incl. parent
        if(b.service_variante_id){
          var svRes=await fetch(SURL+'/rest/v1/service_varianten?id=eq.'+b.service_variante_id+'&select=service_name,preis,dauer_minuten,service_id',{
            headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
          });
          var svData=await svRes.json();
          if(svData&&svData[0]){
            var varianteName=svData[0].service_name||'';
            if(svData[0].preis)price=svData[0].preis;
            // Load parent service name
            if(svData[0].service_id){
              try{
                var psRes=await fetch(SURL+'/rest/v1/services?id=eq.'+svData[0].service_id+'&select=name',{
                  headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
                });
                var psData=await psRes.json();
                var parentName=psData&&psData[0]?psData[0].name:'';
                svcNames=parentName&&varianteName&&parentName!==varianteName?parentName+' · '+varianteName:(varianteName||parentName||'—');
              }catch(e){svcNames=varianteName||'—';}
            }else{svcNames=varianteName||'—';}
          }
        }
        // mitarbeiter_id → staff name
        if(b.mitarbeiter_id){
          var stRes=await fetch(SURL+'/rest/v1/mitarbeiter?id=eq.'+b.mitarbeiter_id+'&select=display_name,name',{
            headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
          });
          var stData=await stRes.json();
          if(stData&&stData[0]){
            staffName=stData[0].display_name||stData[0].name||'—';
          }
        }
        // google_event_id
        if(b.google_event_id&&!googleEventId)googleEventId=b.google_event_id;
      }
    }catch(e){console.error('Booking load error:',e);}
  }

  // Buchungsdetails setzen
  document.getElementById('d-service').textContent=decodeURIComponent(svcNames);
  document.getElementById('d-date').textContent=decodeURIComponent(date);
  document.getElementById('d-time').textContent=time?time:'—';
  if(staffName&&staffName!=='—'){
    document.getElementById('d-staff').textContent=decodeURIComponent(staffName);
  } else {
    document.getElementById('d-staff-row').style.display='none';
  }
  // Kalender-Links aufbauen
  var calStart='', calEnd='';
  try{
    if(b && b.termin_start){
      // already loaded from Supabase
      var ds=new Date(b.termin_start);
      var de=b.termin_ende?new Date(b.termin_ende):new Date(ds.getTime()+60*60*1000);
      calStart=ds.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      calEnd=de.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    }
  }catch(e){}
  if(calStart){
    var calTitle=encodeURIComponent((document.getElementById('d-service').textContent||'Termin')+' — '+(document.getElementById('salon-name').textContent||'Salon'));
    var calDesc=encodeURIComponent('Gebucht über insy-reception.com');
    // Google Calendar link
    var gLink='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+calTitle+'&dates='+calStart+'/'+calEnd+'&details='+calDesc;
    document.getElementById('cal-google').href=gLink;
    document.getElementById('cal-btns').style.display='flex';
  }

  // Staff anzeigen — aus Supabase-Daten (bereits geladen)
  if(staffName&&staffName!=='—'){
    document.getElementById('d-staff').textContent=decodeURIComponent(staffName);
  } else {
    document.getElementById('d-staff-row').style.display='none';
  }

  // Buchungslink zurück
  var link=document.getElementById('new-booking-link');
  if(salonId){
    if(link)link.href='https://insy-reception.com/booking?salon_id='+salonId;
  }

  // Salon Info + Öffnungszeiten laden
  if(salonId){
    try{
      var res=await fetch(SURL+'/rest/v1/kunden_profile?id=eq.'+salonId+'&select=brand_name,name,street,house_number,postal_code,city,area_code,phone_number,instagram_url,website_url,google_maps_url,arbeitszeiten,feature_settings,note',{
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
      });
      var data=await res.json();
      if(data&&data[0]){
        var d=data[0];
        var salonName=d.brand_name||d.name||'Salon';
        document.getElementById('salon-name').textContent=salonName;

        // Adresse
        var phoneRaw=[d.area_code,d.phone_number].filter(Boolean).join(' ');
        var street=[d.street,d.house_number].filter(Boolean).join(' ');
        var city=[d.postal_code,d.city].filter(Boolean).join(' ');
        var addr=[street,city].filter(Boolean).join(', ');
        var phoneEl=document.getElementById('salon-phone');
        var addrEl=document.getElementById('salon-address');
        if(phoneEl&&phoneRaw){phoneEl.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>'+phoneRaw;phoneEl.style.display='flex';}
        if(addrEl&&addr){addrEl.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+addr;addrEl.style.display='flex';if(d.google_maps_url){addrEl.href=d.google_maps_url;addrEl.target='_blank';}}

        // Links
        var hasLinks=false;
        var igEl=document.getElementById('salon-instagram');
        var webEl=document.getElementById('salon-website');
        if(igEl&&d.instagram_url){igEl.href=d.instagram_url;igEl.style.display='flex';hasLinks=true;}
        if(webEl&&d.website_url){webEl.href=d.website_url;webEl.style.display='flex';hasLinks=true;}
        if(d.mobile_url){var mEl=document.getElementById('salon-mobile-link');var mLbl=document.getElementById('salon-mobile-label');if(mEl){mEl.href='tel:'+d.mobile_url.replace(/\s/g,'');mEl.style.display='flex';if(mLbl)mLbl.textContent=d.mobile_url;}}
        if(hasLinks)document.getElementById('hd-links-row').style.display='flex';

        // Bemerkung/Hinweis
        if(d.note&&d.note.trim()){
          var noteEl=document.getElementById('hd-note');
          var noteTxt=document.getElementById('hd-note-text');
          if(noteEl)noteEl.style.display='flex';
          if(noteTxt)noteTxt.textContent=d.note.trim();
        }

        // Öffnungszeiten
        if(d.arbeitszeiten){
          window.SALON_AZ=d.arbeitszeiten;
          renderWorkingHours(d.arbeitszeiten);
        }
      }
    }catch(e){console.error(e);}
  }
}

// ── Öffnungszeiten Helpers ──
var hoursOpen=false;
var DAY_ORDER=['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
var DAY_LABELS={monday:'Montag',tuesday:'Dienstag',wednesday:'Mittwoch',thursday:'Donnerstag',friday:'Freitag',saturday:'Samstag',sunday:'Sonntag'};
function getTodayKey(){var m={0:'sunday',1:'monday',2:'tuesday',3:'wednesday',4:'thursday',5:'friday',6:'saturday'};return m[new Date().getDay()];}
function _slotsFor(h){if(h.slots&&h.slots.length)return h.slots;if(h.start||h.end)return[{start:h.start||'09:00',end:h.end||'18:00'}];return[{start:'09:00',end:'18:00'}];}
function formatHours(d){if(!d)return'—';if(!d.aktiv)return'Geschlossen';var sl=_slotsFor(d);if(!sl.length)return'—';return sl.map(function(s){return s.start+' – '+s.end;}).join('<br>');}
function toggleHours(){
  hoursOpen=!hoursOpen;
  document.getElementById('hours-drop').style.display=hoursOpen?'block':'none';
}
document.addEventListener('click',function(e){
  if(hoursOpen&&!e.target.closest('#hours-pill')){
    hoursOpen=false;
    var d=document.getElementById('hours-drop');
    if(d)d.style.display='none';
  }
});
function renderWorkingHours(az){
  var todayKey=getTodayKey();
  var todayData=az[todayKey];
  var hoursText=formatHours(todayData).replace('<br>',' / ');
  var isOpen=todayData&&todayData.aktiv&&hoursText!=='Geschlossen';
  var hst=document.getElementById('hd-hours-status');
  if(hst){hst.textContent=isOpen?'Geöffnet':'Geschlossen';hst.style.color=isOpen?'#4ade80':'rgba(255,255,255,.5)';}
  var lbl=document.getElementById('today-hours-label');
  if(lbl)lbl.textContent=' '+hoursText+' ▾';
  var drop=document.getElementById('hours-drop');
  if(drop){
    drop.innerHTML=DAY_ORDER.map(function(k){
      var d=az[k],isToday=k===todayKey,isClosed=!d||!d.aktiv;
      var cls='hd-hour-row'+(isToday?' hd-hour-today':'')+(isClosed?' hd-hour-closed':'');
      return'<div class="'+cls+'"><span>'+DAY_LABELS[k]+'</span><span>'+formatHours(d).replace('<br>',' / ')+'</span></div>';
    }).join('');
  }
}

async function cancelBooking(){

  btn.disabled=true;btn.textContent='Wird storniert…';
  try{
