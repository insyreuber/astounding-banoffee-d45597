<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buchung bestätigt · Insy Reception</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f3f0f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}

.card{
  background:var(--tp,#4a1c6b);
  border-radius:20px;
  padding:40px 36px;
  max-width:440px;
  width:100%;
  text-align:center;
  box-shadow:0 20px 60px rgba(74,28,107,0.25);
  position:relative;
  overflow:hidden;
}

/* Salon Info */
.salon-info{
  margin-bottom:28px;
  padding-bottom:20px;
  border-bottom:1px solid rgba(255,255,255,0.12);
  text-align:left;
}
.salon-brand{font-family:'Playfair Display',serif;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:none;margin-bottom:4px;line-height:1}.salon-brand .insy{color:#fff}.salon-brand .reception{color:#C9A84C}
.salon-name{font-size:16px;font-weight:600;color:#fff;margin-bottom:8px}
.salon-chips{display:flex;flex-wrap:wrap;gap:6px}
.salon-chip{display:flex;align-items:center;gap:4px;font-size:11px;color:rgba(255,255,255,.55)}
.salon-chip svg{flex-shrink:0;opacity:0.7}
.salon-chip a{color:rgba(255,255,255,.65);text-decoration:none}
.salon-chip a:hover{color:#fff}

/* Check */
.check-wrap{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,0.35),rgba(201,168,76,0.15));border:2px solid rgba(201,168,76,0.55);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}

.conf-title{font-size:20px;font-weight:600;color:#fff;margin-bottom:20px}

/* Pills */
.pills{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:24px}
.pill{display:inline-flex;align-items:center;font-size:12px;padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.12);color:#fff}
.pill.gold{background:rgba(201,168,76,.2);color:#e8d08a;border:1px solid rgba(201,168,76,.3)}

/* Details */
.details{background:rgba(0,0,0,.15);border-radius:12px;padding:14px 16px;margin-bottom:24px;text-align:left}
.detail-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px}
.detail-row:not(:last-child){border-bottom:1px solid rgba(255,255,255,.06)}
.detail-label{color:rgba(255,255,255,.45)}
.detail-value{color:#fff;font-weight:500;text-align:right}


.cal-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.35);border-radius:10px;padding:10px 20px;font-size:13px;color:#e8d08a;cursor:pointer;font-family:inherit;transition:all .2s;text-decoration:none;margin-top:12px}
.cal-btn:hover{background:rgba(201,168,76,.25);border-color:rgba(201,168,76,.6)}
/* Cancel Button */
.cancel-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:none;border:1.5px solid rgba(255,100,100,.4);
  border-radius:10px;padding:10px 20px;
  font-size:13px;color:rgba(255,160,160,.9);
  cursor:pointer;font-family:inherit;
  transition:all .2s;
}
.cancel-btn:hover{background:rgba(255,100,100,.1);border-color:rgba(255,100,100,.7);}

/* New booking link */
.new-link{display:block;margin-top:14px;font-size:12px;color:rgba(255,255,255,.4);text-decoration:none;}
.new-link:hover{color:rgba(255,255,255,.7);}

@media(max-width:480px){
  .card{padding:28px 20px}
  .salon-chips{gap:8px}
}
</style>
</head>
<body>

<div class="card" id="conf-card">

  <!-- Zurück zur Buchungsseite -->
  <a id="back-to-booking" href="#" title="Neuen Termin buchen" style="position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.35);text-decoration:none;padding:5px 10px;border-radius:8px;border:1px solid rgba(255,255,255,.12);transition:all .2s;z-index:10" onmouseover="this.style.color='rgba(255,255,255,.7)';this.style.borderColor='rgba(255,255,255,.3)'" onmouseout="this.style.color='rgba(255,255,255,.35)';this.style.borderColor='rgba(255,255,255,.12)'">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Neuer Termin
  </a>
  <!-- Salon Info wird dynamisch geladen -->
  <div class="salon-info" id="salon-info">
    <div class="salon-brand"><span class="insy">Insy</span> <span class="reception">Reception</span></div>
    <div class="salon-name" id="salon-name">—</div>
    <div class="salon-chips" id="salon-chips"></div>
  </div>

  <!-- Bestätigung -->
  <div class="check-wrap">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="conf-title">Buchung bestätigt!</div>

  <!-- Termin-Details -->
  <div class="details" id="booking-details">
    <div class="detail-row"><span class="detail-label">Service</span><span class="detail-value" id="d-service">—</span></div>
    <div class="detail-row" id="d-staff-row"><span class="detail-label">Mitarbeiter</span><span class="detail-value" id="d-staff">—</span></div>
    <div class="detail-row"><span class="detail-label">Datum</span><span class="detail-value" id="d-date">—</span></div>
    <div class="detail-row"><span class="detail-label">Uhrzeit</span><span class="detail-value" id="d-time">—</span></div>
    <div class="detail-row" id="d-price-row"><span class="detail-label">Preis</span><span class="detail-value" id="d-price">—</span></div>
  </div>

  <!-- Stornieren -->
  <button class="cancel-btn" id="cancel-btn" onclick="cancelBooking()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    Termin stornieren
  </button>

  <!-- Kalender Button -->
  <div id="cal-btns" style="display:none;margin-top:12px;display:flex;flex-direction:column;align-items:center;gap:8px">
    <a id="cal-google" class="cal-btn" href="#" target="_blank">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      In Google Kalender speichern
    </a>
    <a id="cal-ics" class="cal-btn" href="#" download="termin.ics">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      In Kalender speichern (.ics)
    </a>
  </div>

  <!-- Neuen Termin buchen — nur nach Stornierung sichtbar -->
  <a class="new-link" id="new-booking-link" href="#" style="display:none">+ Neuen Termin buchen</a>

  <!-- Hintergrund Wasserzeichen -->
  <div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:52px;font-weight:700;color:rgba(255,255,255,0.04);white-space:nowrap;pointer-events:none;letter-spacing:0.05em;user-select:none" id="watermark">INSY RECEPTION</div>
</div>

<script>
var sb=null;
var params=new URLSearchParams(window.location.search);
var salonId=params.get('salon_id');
var bookingId=params.get('booking_id');
var googleEventId=params.get('google_event_id');
var svcNames=params.get('services')||'—';
var staffName=params.get('staff')||'—';
var date=params.get('date')||'—';
var time=params.get('time')||'—';
var price=params.get('price');

// Supabase
var SURL='https://uzemgxfjgjwqfgfwbboi.supabase.co';
var SKEY='sb_publishable__XubcF5yPDyIMpfE7kO9Rg_Xp7kj0hL';

async function init(){
  // Buchungsdetails — erst aus URL, dann aus Supabase nachladen
  var needsLoad = (!svcNames || svcNames==='—') && bookingId;

  if(needsLoad){
    try{
      var bRes=await fetch(SURL+'/rest/v1/bookings?id=eq.'+bookingId+'&select=*',{
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
      });
      var bData=await bRes.json();
      if(bData&&bData[0]){
        var b=bData[0];
        // termin_start → date + time
        if(b.termin_start){
          var d=new Date(b.termin_start);
          date=d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit',year:'numeric'});
          time=d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
        }
        // service_variante_id → service name
        if(b.service_variante_id){
          var svRes=await fetch(SURL+'/rest/v1/service_varianten?id=eq.'+b.service_variante_id+'&select=service_name,preis,dauer_minuten',{
            headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
          });
          var svData=await svRes.json();
          if(svData&&svData[0]){
            svcNames=svData[0].service_name||'—';
            if(svData[0].preis)price=svData[0].preis;
          }
        }
        // mitarbeiter_id → staff name
        if(b.mitarbeiter_id){
          var stRes=await fetch(SURL+'/rest/v1/mitarbeiter?id=eq.'+b.mitarbeiter_id+'&select=display_name,name',{
            headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
          });
          var stData=await stRes.json();
          if(stData&&stData[0]){
            staffName=stData[0].display_name||stData[0].name||'—';
          }
        }
        // google_event_id
        if(b.google_event_id&&!googleEventId)googleEventId=b.google_event_id;
      }
    }catch(e){console.error('Booking load error:',e);}
  }

  // Buchungsdetails setzen
  document.getElementById('d-service').textContent=decodeURIComponent(svcNames);
  document.getElementById('d-date').textContent=decodeURIComponent(date);
  document.getElementById('d-time').textContent=time?time+' Uhr':'—';
  // Kalender-Links aufbauen
  var calStart='', calEnd='';
  try{
    if(b && b.termin_start){
      // already loaded from Supabase
      var ds=new Date(b.termin_start);
      var de=b.termin_ende?new Date(b.termin_ende):new Date(ds.getTime()+60*60*1000);
      calStart=ds.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
      calEnd=de.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
    }
  }catch(e){}
  if(calStart){
    var calTitle=encodeURIComponent((document.getElementById('d-service').textContent||'Termin')+' — '+(document.getElementById('salon-name').textContent||'Salon'));
    var calDesc=encodeURIComponent('Gebucht über insy-reception.com');
    // Google Calendar link
    var gLink='https://calendar.google.com/calendar/render?action=TEMPLATE&text='+calTitle+'&dates='+calStart+'/'+calEnd+'&details='+calDesc;
    document.getElementById('cal-google').href=gLink;
    // ICS file
    var ics='BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:'+calStart+'\nDTEND:'+calEnd+'\nSUMMARY:'+decodeURIComponent(calTitle)+'\nDESCRIPTION:'+decodeURIComponent(calDesc)+'\nEND:VEVENT\nEND:VCALENDAR';
    var icsBlob=new Blob([ics],{type:'text/calendar'});
    document.getElementById('cal-ics').href=URL.createObjectURL(icsBlob);
    document.getElementById('cal-btns').style.display='flex';
  }

  if(price&&price!=='null'){
    document.getElementById('d-price').textContent=price+' €';
  } else {
    document.getElementById('d-price-row').style.display='none';
  }

  // Buchungslink zurück
  var link=document.getElementById('new-booking-link');
  var backBtn=document.getElementById('back-to-booking');
  if(salonId){
    if(link)link.href='https://insy-reception.com/booking?salon_id='+salonId;
    if(backBtn)backBtn.href='https://insy-reception.com/booking?salon_id='+salonId;
  }

  // Salon Info + Mitarbeiter laden
  if(salonId){
    try{
      var res=await fetch(SURL+'/rest/v1/kunden_profile?id=eq.'+salonId+'&select=brand_name,name,street,house_number,postal_code,city,area_code,phone_number,instagram_url,website_url,google_maps_url',{
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
      });
      var data=await res.json();
      if(data&&data[0]){
        var d=data[0];
        document.getElementById('salon-name').textContent=d.brand_name||d.name||'Salon';
        document.getElementById('watermark').textContent=d.brand_name||d.name||'INSY RECEPTION';
        var chips='';
        var addr=[d.street,d.house_number,(d.postal_code||''),d.city].filter(Boolean).join(' ');
        if(addr){
          var mapsHref=d.google_maps_url?'href="'+d.google_maps_url+'" target="_blank"':'';
          chips+='<div class="salon-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><a '+mapsHref+'>'+addr+'</a></div>';
        }
        if(d.area_code&&d.phone_number){
          chips+='<div class="salon-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>'+d.area_code+' '+d.phone_number+'</div>';
        }
        if(d.instagram_url){
          chips+='<div class="salon-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/></svg><a href="'+d.instagram_url+'" target="_blank">Instagram</a></div>';
        }
        if(d.website_url){
          chips+='<div class="salon-chip"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg><a href="'+d.website_url+'" target="_blank">Website</a></div>';
        }
        document.getElementById('salon-chips').innerHTML=chips;
      }
    }catch(e){console.error(e);}

    // Mitarbeiter aus URL-Parameter laden
    var staffParam=params.get('staff_id');
    if(staffParam){
      try{
        var sres=await fetch(SURL+'/rest/v1/mitarbeiter?id=eq.'+staffParam+'&select=display_name,name',{
          headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY}
        });
        var sdata=await sres.json();
        if(sdata&&sdata[0]){
          document.getElementById('d-staff').textContent=sdata[0].display_name||sdata[0].name;
        } else {
          document.getElementById('d-staff-row').style.display='none';
        }
      }catch(e){document.getElementById('d-staff-row').style.display='none';}
    } else if(staffName&&staffName!=='—'){
      document.getElementById('d-staff').textContent=decodeURIComponent(staffName);
    } else {
      document.getElementById('d-staff-row').style.display='none';
    }
  }
}

async function cancelBooking(){
  if(!confirm('Möchtest du den Termin wirklich stornieren?'))return;
  var btn=document.getElementById('cancel-btn');
  btn.disabled=true;btn.textContent='Wird storniert…';
  try{
    await fetch('https://insy-n8n-u71054.vm.elestio.app/webhook/cancel-booking',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({booking_id:bookingId,google_event_id:googleEventId,salon_id:salonId})
    });
    document.getElementById('conf-card').innerHTML=
      '<div class="check-wrap" style="background:rgba(255,100,100,.2)">'
      +'<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div>'
      +'<div class="conf-title">Termin storniert</div>'
      +'<p style="font-size:13px;color:rgba(255,255,255,.5);margin-bottom:24px">Dein Termin wurde erfolgreich storniert.</p>'
      +'<a href="https://insy-reception.com/booking?salon_id='+salonId+'" style="display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:10px;padding:10px 20px;font-size:13px;color:#fff;text-decoration:none;font-family:inherit">+ Neuen Termin buchen</a>'
      +'<div style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:52px;font-weight:700;color:rgba(255,255,255,0.04);white-space:nowrap;pointer-events:none;user-select:none">INSY RECEPTION</div>';
  }catch(e){
    btn.disabled=false;btn.textContent='Termin stornieren';
    alert('Fehler beim Stornieren. Bitte ruf uns an.');
  }
}

init();
</script>
</body>
</html>
