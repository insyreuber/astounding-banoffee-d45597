<!DOCTYPE html>
<html>
<head>
<style>
:root{--tp:#4a1c6b;--tpl:#6b3fa0;--tpp:#f0eaf7;--tg:#c9a84c;--tgl:#e8d08a;--tgp:#fdf8ec;--td:#1a0a2e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f2f8;width:100%}

/* ── HEADER – stabil, kein Layout-Einfluss auf den Rest ── */
.hd{
  background:var(--tp);
  padding:10px 16px;
  width:100%;
  position:relative; /* Stacking-Context für das Hours-Dropdown */
}
.hd-inner{
  display:flex;
  align-items:flex-start;
  gap:12px;
  flex-wrap:wrap;       /* bricht um statt sich zu verzerren */
}
.hd-logo{font-size:9px;letter-spacing:.16em;color:var(--tg);font-weight:500;text-transform:uppercase;margin-bottom:1px}
.hd-name{font-size:15px;font-weight:500;color:#fff;margin-bottom:3px}
.hd-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hd-chip{font-size:11px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}

/* ── Haupt-Layout – volle Breite ── */
.wrap{
  width:100%;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* ── Karten & Komponenten ── */
.card{background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;padding:13px}
.ctitle{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cnum{background:var(--tp);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}

.dual-tog{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fff;border:1.5px solid #e8e0f0;border-radius:8px;cursor:pointer;margin-bottom:10px}
.dual-tog.on{border-color:var(--tp);background:var(--tpp)}
.tog-box{width:18px;height:18px;border-radius:4px;border:1.5px solid #c8bcd8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dual-tog.on .tog-box{background:var(--tp);border-color:var(--tp)}
.tog-lbl{font-size:13px;font-weight:500;color:var(--td)}
.tog-sub{font-size:11px;color:#7a6a8a}

.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.svc{border:1.5px solid #e8e0f0;border-radius:8px;padding:10px 9px;cursor:pointer;position:relative;overflow:hidden;background:#fff}
.svc:hover{border-color:var(--tpl)}
.svc.sel1only{border-color:var(--tp);background:var(--tpp)}
.svc.sel2only{border-color:var(--tg);background:var(--tgp)}
.svc.selboth{border:none;background:#fff;outline:2px solid var(--tp)}
.svc.selboth::before{content:'';position:absolute;inset:0;left:0;width:50%;background:var(--tpp);z-index:0}
.svc.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.svc-inner{position:relative;z-index:1}
.svc-n{font-size:13px;font-weight:500;color:var(--td);margin-bottom:2px}
.svc-d{font-size:11px;color:#7a6a8a}
.svc-p{font-size:11px;font-weight:500;color:var(--tg);margin-top:5px}
.svc-badges{display:flex;gap:3px;margin-top:5px;position:relative;z-index:1}
.sbadge-sm{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:500}
.sbadge-1{background:var(--tp);color:#fff}
.sbadge-2{background:var(--tg);color:var(--td)}
.svc-next{position:absolute;top:6px;right:7px;font-size:9px;color:rgba(74,28,107,.4);z-index:2}

.dur-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.dur{border:1.5px solid #e8e0f0;border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;position:relative;overflow:hidden;background:#fff}
.dur:hover{border-color:var(--tpl)}
.dur.sel1only{border-color:var(--tp);background:var(--tpp)}
.dur.sel2only{border-color:var(--tg);background:var(--tgp)}
.dur.selboth{border:none;outline:2px solid var(--tp);background:#fff}
.dur.selboth::before{content:'';position:absolute;inset:0;width:50%;background:var(--tpp);z-index:0}
.dur.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.dur-inner{position:relative;z-index:1}
.dur-m{font-size:15px;font-weight:500;color:var(--td)}
.dur-l{font-size:10px;color:#7a6a8a}
.dur-p{font-size:11px;color:var(--tg);font-weight:500;margin-top:3px}

.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.acc-hdr-left{display:flex;align-items:center;gap:8px}
.acc-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500}
.acc-current{font-size:12px;color:#7a6a8a}
.acc-arrow{font-size:16px;color:var(--tpl);transition:transform .2s;line-height:1}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s,margin .2s}
.acc-body.open{max-height:600px;opacity:1;margin-top:10px}
.staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.stf{border:1.5px solid #e8e0f0;border-radius:8px;padding:10px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;background:#fff;position:relative;overflow:hidden}
.stf:hover{border-color:var(--tpl)}
.stf.sel1only{border-color:var(--tp);background:var(--tpp)}
.stf.sel2only{border-color:var(--tg);background:var(--tgp)}
.stf.selboth{border:none;outline:2px solid var(--tp);background:#fff}
.stf.selboth::before{content:'';position:absolute;inset:0;width:50%;background:var(--tpp);z-index:0}
.stf.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.stf-inner{position:relative;z-index:1;display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.av{width:36px;height:36px;border-radius:50%;background:var(--tpp);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--tp);flex-shrink:0}
.av.g{background:var(--tgp);color:#7a5a00}
.stf-n{font-size:13px;font-weight:500;color:var(--td)}
.stf-r{font-size:11px;color:#7a6a8a;margin-top:1px}
.stf-av{font-size:10px;color:#3b7a57;margin-top:2px}
.stf-na{font-size:10px;color:#c8bcd8;margin-top:2px}
.stf-badges{display:flex;gap:3px;position:relative;z-index:1;flex-shrink:0}
.sbadge{width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.sb1{background:var(--tp);color:#fff}
.sb2{background:var(--tg);color:var(--td)}

.cal-sum-row{display:grid;grid-template-columns:1fr 230px;gap:10px;align-items:start}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.cal-nav{background:none;border:1px solid #e8e0f0;border-radius:6px;padding:2px 9px;cursor:pointer;font-size:14px;color:var(--tp);line-height:1.4}
.cal-nav:hover{background:var(--tpp)}
.cal-mo{font-size:12px;font-weight:500;color:var(--td)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
.cdl{text-align:center;font-size:9px;color:#7a6a8a;padding:2px 0}
.cd{text-align:center;padding:5px 2px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--td)}
.cd:hover:not(.cp):not(.ce){background:var(--tpp);color:var(--tp)}
.cd.cs{background:var(--tp);color:#fff;font-weight:500}
.cd.ce,.cd.cp{pointer-events:none}
.cd.cp{color:#ccc}
.cd.ct{color:var(--tp);font-weight:500}
.slot-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin:8px 0 5px}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.sl{border:1.5px solid #e8e0f0;border-radius:6px;padding:6px 2px;text-align:center;font-size:11px;cursor:pointer;color:var(--td)}
.sl:hover:not(.sb){border-color:var(--tp);color:var(--tp);background:var(--tpp)}
.sl.ss{background:var(--tp);color:#fff;border-color:var(--tp);font-weight:500}
.sl.sb{background:#f5f2f8;color:#ccc;pointer-events:none;font-size:9px}

.sumcard{background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;overflow:hidden}
.sum-hdr{background:var(--tp);padding:10px 13px}
.sum-hdr-t{font-size:10px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:.05em;text-transform:uppercase}
.sum-hdr-p{font-size:22px;font-weight:500;color:var(--tg);margin-top:1px}
.sumrow{display:flex;justify-content:space-between;align-items:center;padding:6px 13px;border-bottom:1px solid #f0eaf7;font-size:12px}
.sumrow:last-child{border-bottom:none}
.sl-lbl{color:#7a6a8a}
.sl-val{font-weight:500;color:var(--td);text-align:right}
.sl-val.emp{color:#ccc;font-weight:400}
.contact-block{padding:11px 13px;background:#faf8fc;border-top:1.5px solid #f0eaf7}
.contact-ttl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin-bottom:9px}
.field{margin-bottom:8px}
.field label{display:block;font-size:11px;color:#6a5a7a;margin-bottom:3px;font-weight:500}
.field input{width:100%;border:1.5px solid #e8e0f0;border-radius:7px;padding:7px 10px;font-size:12px;color:var(--td);background:#fff;font-family:inherit}
.field input:focus{outline:none;border-color:var(--tp)}
.phone-wrap{display:flex;border:1.5px solid #e8e0f0;border-radius:7px;overflow:visible;background:#fff}
.phone-wrap.ok{border-color:#3b7a57}
.phone-wrap.err{border-color:#d0021b}
.phone-country{display:flex;align-items:center;gap:4px;padding:0 8px;cursor:pointer;background:#faf8fc;border-right:1.5px solid #e8e0f0;position:relative;flex-shrink:0}
.phone-dial{font-size:11px;font-weight:500;color:var(--td)}
.phone-input{flex:1;border:none;outline:none;padding:7px 9px;font-size:12px;color:var(--td);background:transparent;font-family:inherit;min-width:0}
.phone-status{font-size:10px;margin-top:2px}
.phone-status.ok{color:#3b7a57}
.phone-status.err{color:#d0021b}
.phone-status.hint{color:#7a6a8a}
.country-drop{position:absolute;top:calc(100% + 4px);left:-1px;background:#fff;border:1.5px solid #e8e0f0;border-radius:8px;z-index:200;min-width:200px;overflow:hidden;box-shadow:0 4px 16px rgba(74,28,107,.1)}
.country-search{padding:5px 9px;border-bottom:1px solid #f0eaf7}
.country-search input{width:100%;border:none;outline:none;font-size:12px;color:var(--td);font-family:inherit;background:transparent}
.country-list{max-height:150px;overflow-y:auto}
.country-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--td)}
.country-item:hover,.country-item.sel{background:var(--tpp)}
.book-btn{width:100%;background:var(--tg);border:none;padding:11px;font-size:14px;font-weight:500;color:var(--td);cursor:pointer;font-family:inherit}
.book-btn:hover{background:var(--tgl)}
.book-btn:disabled{background:#e8e0f0;color:#aaa;cursor:not-allowed}
.hint{font-size:10px;color:#7a6a8a;line-height:1.5;margin-top:4px}
.divider{border:none;border-top:1.5px dashed #e8e0f0;margin:10px 0}
.conf{background:var(--tp);border-radius:10px;padding:2.5rem 1.5rem;text-align:center;margin:10px}
.conf-cc{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.conf-t{font-size:17px;font-weight:500;color:#fff;margin-bottom:6px}
.conf-s{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:1rem}
.cpill{display:inline-flex;font-size:11px;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.15);color:#fff;margin:2px}
.cpill.g{background:var(--tgp);color:#7a5a00}
.reset-btn{background:none;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 18px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;margin-top:1rem}

/* Hours dropdown – bleibt innerhalb des Headers */
.hd-hours-inline{cursor:pointer;position:relative;user-select:none}
.hd-hours-inline:hover{color:rgba(255,255,255,.82)}
.hd-hours-drop{
  position:absolute;
  top:calc(100% + 6px);
  left:0;
  background:#fff;
  border:1.5px solid #e8e0f0;
  border-radius:10px;
  padding:10px 14px;
  min-width:200px;
  z-index:300;
  box-shadow:0 4px 16px rgba(74,28,107,.12);
  display:none;
}
.hd-hour-row{display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#7a6a8a;padding:3px 0}
.hd-hour-today{color:var(--td);font-weight:500}
.hd-hour-closed{color:#c8bcd8}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────── -->
<div class="hd">
  <div class="hd-inner">
    <div>
      <div class="hd-logo" id="brand-name">Insy Reception</div>
      <div class="hd-name" id="salon-name">Salonname</div>
      <div class="hd-meta">
        <div class="hd-chip" id="salon-address">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Adresse
        </div>
        <div class="hd-chip" id="salon-phone">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.79 0 013.07 9.81 19.79 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
          Telefonnummer
        </div>
        <div class="hd-chip hd-hours-inline" id="hours-pill" onclick="toggleHours()">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          <span id="today-hours-label">09:00 – 17:00 ▾</span>
          <div class="hd-hours-drop" id="hours-drop"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="wrap" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var hoursOpen=false;
window.toggleHours=function(){
  hoursOpen=!hoursOpen;
  document.getElementById('hours-drop').style.display=hoursOpen?'block':'none';
};
document.addEventListener('click',function(e){
  if(hoursOpen&&!e.target.closest('#hours-pill')){
    hoursOpen=false;
    var d=document.getElementById('hours-drop');
    if(d)d.style.display='none';
  }
});

// Dynamisch aus Supabase befüllt
var SVCS=[];
var VARIANTEN={};
var STAFF=[
  {id:'any',name:'Ohne Präferenz',role:'Nächste verfügbare Person',ini:'?',gold:true,avail:true}
];
var STAFF_BUSY={};
var COUNTRIES=[
  {code:'DE',flag:'🇩🇪',name:'Deutschland',dial:'+49',re:/^(\+49|0049|0)?1[5-7]\d{8,9}$/},
  {code:'AT',flag:'🇦🇹',name:'Österreich',dial:'+43',re:/^(\+43|0043|0)?6\d{8,12}$/},
  {code:'CH',flag:'🇨🇭',name:'Schweiz',dial:'+41',re:/^(\+41|0041|0)?7[5-9]\d{7}$/},
  {code:'TR',flag:'🇹🇷',name:'Türkei',dial:'+90',re:/^(\+90|0090|0)?5\d{9}$/},
  {code:'GB',flag:'🇬🇧',name:'Großbritannien',dial:'+44',re:/^(\+44|0044|0)?7\d{9}$/},
  {code:'NL',flag:'🇳🇱',name:'Niederlande',dial:'+31',re:/^(\+31|0031|0)?6\d{8}$/},
];
var BASE_SLOTS=['09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30'];
var BUSY={};
var AVAIL_SLOTS={}; // { mitarbeiter_id: ['09:00','10:00',...] } — verfügbare Slots von n8n

var st={
  dual:false,
  svc1:null,svc2:null,
  dur1:null,dur2:null,
  stf1:'any',stf2:'any',
  day:null,slot:null,
  name:'',phone:'',country:COUNTRIES[0],
  nextSvc:1, nextDur:1, nextStf:1
};
var calOff=0,staffOpen=false,dropOpen=false,dropSearch='';

function fsvc(id){return SVCS.filter(function(x){return x.id===id;})[0]||null;}
// Variante anhand ihrer ID suchen (über alle Services)
function fdur(id){
  var all=[];
  Object.keys(VARIANTEN).forEach(function(k){all=all.concat(VARIANTEN[k]);});
  return all.filter(function(x){return x.id===id;})[0]||null;
}
// Varianten für den aktuell gewählten Service
function currentVarianten(svcId){
  if(!svcId)return[];
  return VARIANTEN[svcId]||[];
}
function fname(id){if(!id||id==='any')return'Ohne Präferenz';var f=STAFF.filter(function(x){return x.id===id;})[0];return f?f.name:null;}

function availSlots(){
  var mid=st.stf1&&st.stf1!=='any'?st.stf1:null;
  // Öffnungszeiten des gewählten Tages holen
  var openSlots=BASE_SLOTS;
  if(st.day&&window.SALON_AZ){
    var DAY_KEYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    var parts=st.day.split('-');
    var dateObj=new Date(+parts[0],+parts[1]-1,+parts[2]);
    var dayKey=DAY_KEYS[dateObj.getDay()];
    var az=window.SALON_AZ[dayKey];
    if(az&&az.aktiv&&az.start&&az.end){
      var startMin=parseInt(az.start.split(':')[0])*60+parseInt(az.start.split(':')[1]);
      var endMin=parseInt(az.end.split(':')[0])*60+parseInt(az.end.split(':')[1]);
      openSlots=BASE_SLOTS.filter(function(s){
        var sm=parseInt(s.split(':')[0])*60+parseInt(s.split(':')[1]);
        return sm>=startMin&&sm<endMin;
      });
    }
  }
  if(mid&&AVAIL_SLOTS.hasOwnProperty(mid)){
    var busy=AVAIL_SLOTS[mid];
    if(!busy.length)return openSlots.map(function(s){return{time:s,busy:false};});
    return openSlots.map(function(s){
      return{time:s,busy:busy.indexOf(s)>=0};
    });
  }
  return openSlots.map(function(s){return{time:s,busy:false};});
}

function p1(){var d=fdur(st.dur1);return d?d.preis:null;}
function p2(){var d=fdur(st.dur2);return d?d.preis:null;}
function total(){var a=p1(),b=p2();if(!a)return null;return st.dual&&b?a+b:a;}
function slot2time(){
  if(!st.slot||!st.dur1)return null;
  var d=fdur(st.dur1);if(!d)return null;
  var pts=st.slot.split(':'),mins=parseInt(pts[0])*60+parseInt(pts[1])+d.min;
  return('0'+Math.floor(mins/60)).slice(-2)+':'+('0'+(mins%60)).slice(-2);
}
function normPhone(raw){
  var c=raw.replace(/[\s\-\(\)]/g,'');
  if(c.startsWith('0')&&!c.startsWith('00'))c=st.country.dial+c.slice(1);
  if(!c.startsWith('+'))c=st.country.dial+c;
  return c;
}
function phoneStatus(){
  if(!st.phone.trim())return'empty';
  return st.country.re.test(normPhone(st.phone))?'ok':'err';
}
function canBook(){
  if(!st.svc1||!st.dur1||!st.day||!st.slot||!st.name.trim()||phoneStatus()!=='ok')return false;
  if(st.dual&&(!st.svc2||!st.dur2))return false;
  return true;
}
function getCalData(){
  var now=new Date();
  var base=new Date(now.getFullYear(),now.getMonth()+calOff,1);
  return{base:base,firstDow:(base.getDay()+6)%7,dim:new Date(base.getFullYear(),base.getMonth()+1,0).getDate(),now:now};
}

window.pickSvc=function(id){
  if(!st.dual){
    if(st.svc1!==id){st.dur1=null;} // Dauer zurücksetzen wenn anderer Service
    st.svc1=id;render();return;
  }
  if(st.svc1===id&&st.svc2===id){render();return;}

  else if(st.svc1===id||st.svc2===id){st.svc1=id;st.svc2=id;st.dur1=null;st.dur2=null;st.nextSvc=1;}
  else{
    if(st.nextSvc===1){st.svc1=id;st.dur1=null;st.nextSvc=2;}
    else{st.svc2=id;st.dur2=null;st.nextSvc=1;}

  if(st.dur1===null&&st.dur2===null){st.dur1=id;st.dur2=id;st.nextDur=1;}
  else if(st.dur1===id||st.dur2===id){st.dur1=id;st.dur2=id;st.nextDur=1;}

window.pickStf=function(id){
  if(!st.dual){st.stf1=id;st.slot=null;staffOpen=false;render();return;}
  if(st.stf1===id&&st.stf2===id){staffOpen=false;render();return;}

  else if(st.stf1===id||st.stf2===id){st.stf1=id;st.stf2=id;st.nextStf=1;}

window.toggleStaff=function(){

  if(a)a.className='acc-arrow'+(staffOpen?' open':'');

window.pickDay=function(k){
  st.day=k;st.slot=null;
  BUSY={};AVAIL_SLOTS={};
  renderCalOnly();renderSumOnly();
  var salonId=new URLSearchParams(window.location.search).get('salon_id');
  if(!salonId)return;
  var staffIds=[];
  if(st.stf1&&st.stf1!=='any')staffIds.push(st.stf1);
  if(st.dual&&st.stf2&&st.stf2!=='any')staffIds.push(st.stf2);
  if(!staffIds.length){
    STAFF.forEach(function(s){if(s.id&&s.id!=='any')staffIds.push(s.id);});
  }
  staffIds=staffIds.filter(function(id){return id&&id.length>10;});
  // Datum korrekt formatieren mit führenden Nullen
  var parts=k.split('-');
  var dateFormatted=parts[0]+'-'+('0'+parts[1]).slice(-2)+'-'+('0'+parts[2]).slice(-2);
  staffIds.forEach(function(mid){
    fetch('https://insy-n8n-u71054.vm.elestio.app/webhook/get-availability?salon_id='+salonId+'&mitarbeiter_id='+mid+'&date='+dateFormatted)
      .then(function(r){return r.json();})
      .then(function(data){
        // n8n gibt verfügbare Slots zurück als busy Array
        var raw=Array.isArray(data)?data[0]:data;
        var busySlots=[];
        if(raw&&raw.busy&&Array.isArray(raw.busy)){
          raw.busy.forEach(function(b){
            var start=new Date(b.start);
            var end=new Date(b.end);
            // Alle 30-Minuten-Slots zwischen Start und Ende markieren
            var cur=new Date(start);
            while(cur<end){
              var hh=('0'+cur.getHours()).slice(-2);
              var mm=cur.getMinutes()<30?'00':'30';
              busySlots.push(hh+':'+mm);
              cur.setMinutes(cur.getMinutes()+30);
            }
          });
        }
        AVAIL_SLOTS[mid]=busySlots;
        renderCalOnly();
      })
      .catch(function(){});
  });
};

window.calPrev=function(){calOff--;render();};

window.toggleDrop=function(e){e&&e.stopPropagation();dropOpen=!dropOpen;dropSearch='';renderPhoneOnly();};

function selClass(val1,val2,id,isDual){
  if(!isDual)return val1===id?'sel1only':'';
  var in1=val1===id,in2=val2===id;
  if(in1&&in2)return'selboth';
  if(in1)return'sel1only';
  if(in2)return'sel2only';
  return'';
}

function mkSvcCards(){
  if(!SVCS.length)return'<div style="font-size:12px;color:#7a6a8a;padding:8px">Services werden geladen…</div>';
  return SVCS.map(function(s){
    var cls=selClass(st.svc1,st.svc2,s.id,st.dual);
    var badges='';
    if(st.dual){
      var in1=st.svc1===s.id,in2=st.svc2===s.id;
      if(in1&&in2)badges='<div class="svc-badges"><span class="sbadge-sm sbadge-1">①</span><span class="sbadge-sm sbadge-2">②</span></div>';
      else if(in1)badges='<div class="svc-badges"><span class="sbadge-sm sbadge-1">① Slot 1</span></div>';
      else if(in2)badges='<div class="svc-badges"><span class="sbadge-sm sbadge-2">② Slot 2</span></div>';
    }
    var nextHint='';
    if(st.dual&&cls!=='selboth'&&(st.svc1!==null||st.svc2!==null)){
      nextHint='<span class="svc-next">nächster: Slot '+st.nextSvc+'</span>';
    }
    // Günstigste Variante für "ab X €"
    var vars=VARIANTEN[s.id]||[];
    var minPreis=vars.length?Math.min.apply(null,vars.map(function(v){return v.preis;})):null;
    return'<div class="svc '+cls+'" onclick="pickSvc(\''+s.id+'\')">'
      +nextHint
      +'<div class="svc-inner">'
      +'<div class="svc-n">'+s.name+'</div>'
      +'<div class="svc-d">'+s.desc+'</div>'
      +(minPreis!==null?'<div class="svc-p">ab '+minPreis+' €</div>':'')
      +badges
      +'</div></div>';
  }).join('');}

  // Varianten des gewählten Services (Slot 1 hat Priorität, sonst Slot 2)
  var activeSvcId=st.svc1||st.svc2||null;
  var vars=activeSvcId?currentVarianten(activeSvcId):[];
  if(!activeSvcId){
    return'<div style="font-size:12px;color:#7a6a8a;padding:4px 0">Wähle zuerst einen Service</div>';

    return'<div style="font-size:12px;color:#7a6a8a;padding:4px 0">Keine Varianten verfügbar</div>';
  }
  return vars.map(function(v){
    var cls=selClass(st.dur1,st.dur2,v.id,st.dual);
    var badges='';
    if(st.dual){
      var in1=st.dur1===v.id,in2=st.dur2===v.id;
      if(in1&&in2)badges='<div style="display:flex;gap:2px;justify-content:center;margin-top:3px;position:relative;z-index:1"><span class="sbadge-sm sbadge-1" style="font-size:9px">①</span><span class="sbadge-sm sbadge-2" style="font-size:9px">②</span></div>';
      else if(in1)badges='<div style="text-align:center;margin-top:2px;position:relative;z-index:1"><span class="sbadge-sm sbadge-1" style="font-size:9px">①</span></div>';
      else if(in2)badges='<div style="text-align:center;margin-top:2px;position:relative;z-index:1"><span class="sbadge-sm sbadge-2" style="font-size:9px">②</span></div>';

function mkStaffGrid(){
  return'<div class="staff-grid">'+STAFF.map(function(p){
    var cls=selClass(st.stf1,st.stf2,p.id,st.dual);
    var in1=st.stf1===p.id,in2=st.dual&&st.stf2===p.id;

function mkCal(){
  var cd=getCalData();
  var mo=cd.base.toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  var days='<div class="cd ce"></div>'.repeat(cd.firstDow);
  for(var d=1;d<=cd.dim;d++){
    var isPast=calOff<0||(calOff===0&&d<cd.now.getDate());
    var isToday=calOff===0&&d===cd.now.getDate();
    var key=cd.base.getFullYear()+'-'+(cd.base.getMonth()+1)+'-'+d;
    var isSel=st.day===key;
    var DAY_KEYS=['sunday','monday','tuesday','wednesday','thursday','friday','saturday'];
    var dateObj=new Date(cd.base.getFullYear(),cd.base.getMonth(),d);
    var dayKey=DAY_KEYS[dateObj.getDay()];
    var az=window.SALON_AZ;
    var isClosed=az&&az[dayKey]&&az[dayKey].aktiv===false;
    var isBlocked=isPast||isClosed;
    days+='<div class="cd '+(isBlocked?'cp':'')+' '+(isToday&&!isSel?'ct':'')+' '+(isSel?'cs':'')+'"'
      +(isBlocked?'':' onclick="pickDay(\''+key+'\')"')+' style="'+(isClosed&&!isPast?'text-decoration:line-through;opacity:0.35':'')+'">'+d+'</div>';
  }
  var slots=availSlots();
  var slotsHtml=st.day
    ?'<div class="slot-lbl">Verfügbare Zeiten'+(st.stf1&&st.stf1!=='any'?' — '+fname(st.stf1):'')+'</div>'
      +'<div class="slots">'+slots.map(function(s){
        return'<div class="sl '+(s.busy?'sb':'')+' '+(st.slot===s.time?'ss':'')+'" onclick="'+(s.busy?'':'pickSlot(\''+s.time+'\')')+'">'
          +s.time+(s.busy?'<br><span style="font-size:8px">belegt</span>':'')+'</div>';
      }).join('')+'</div>'
    :'<div style="font-size:11px;color:#7a6a8a;padding:5px 0">Wähle zuerst ein Datum</div>';
  return'<div class="cal-hdr"><button class="cal-nav" onclick="calPrev()">&#8249;</button>'
    +'<span class="cal-mo">'+mo+'</span>'
    +'<button class="cal-nav" onclick="calNext()">&#8250;</button></div>'
    +'<div class="cal-grid">'
    +['Mo','Di','Mi','Do','Fr','Sa','So'].map(function(x){return'<div class="cdl">'+x+'</div>';}).join('')
    +days+'</div>'+slotsHtml
    +(st.dual&&slot2time()?'<p class="hint">② startet ca. '+slot2time()+' Uhr</p>':'');
}

    var salonName=data.brand_name||data.name||'Salonname';
    var salonPhone=[data.area_code,data.phone_number].filter(Boolean).join(' ')||data.phone||'Telefonnummer';
    var salonAddress=[[data.street,data.house_number].filter(Boolean).join(' '),[data.postal_code,data.city].filter(Boolean).join(' ')].filter(Boolean).join(', ')||'Adresse';
    var brandEl=document.getElementById('brand-name');
    var nameEl=document.getElementById('salon-name');
    var phoneEl=document.getElementById('salon-phone');
    var addressEl=document.getElementById('salon-address');
    if(brandEl)brandEl.textContent='INSY RECEPTION';
    if(nameEl)nameEl.textContent=salonName;
    if(phoneEl)phoneEl.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.79 0 013.07 9.81 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>'+salonPhone;
    if(addressEl)addressEl.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>'+salonAddress;
    renderWorkingHours(data.arbeitszeiten);
    // Öffnungszeiten global speichern für Kalender
    window.SALON_AZ=data.arbeitszeiten||null;
    await loadServices(salonId);
    await loadMitarbeiter(salonId);
  }catch(err){console.error('JS Fehler:',err);}
}

async function loadMitarbeiter(salonId){
  try{
    var res=await sb.from('mitarbeiter')
      .select('*')
      .eq('salon_id',salonId)
      .eq('aktiv',true)
      .not('google_calendar_id','is',null)
      .order('sortierung');
    if(res.error){console.error('Mitarbeiter Fehler:',res.error);return;}
    var mitarbeiter=res.data||[];
    // "Ohne Präferenz" bleibt immer erster Eintrag
    STAFF=[{id:'any',name:'Ohne Präferenz',role:'Nächste verfügbare Person',ini:'?',gold:true,avail:true}];
    mitarbeiter.forEach(function(m){
      var name=m.display_name||m.name||'?';
      var ini=name.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();
      STAFF.push({
        id:m.id,
        name:name,
        role:m.role||'',
        ini:ini,
        avail:true,
        color:m.farbe||'#4a1c6b',
        calendar_id:m.google_calendar_id
      });
    });
    render();
  }catch(err){console.error('loadMitarbeiter Fehler:',err);}
}
async function loadServices(salonId){
  try{
    // 1. Services laden
    var sRes=await sb.from('services').select('*').eq('salon_id',salonId).eq('aktiv',true).order('sortierung');
    if(sRes.error){console.error('Services Fehler:',sRes.error);return;}
    var services=sRes.data||[];
    SVCS=services.map(function(s){
      return{id:s.id,name:s.name,desc:s.beschreibung||'',dauer_anzeigen:s.dauer_anzeigen};
    });

    // 2. Varianten für alle Services laden
    var svcIds=services.map(function(s){return s.id;});
    if(svcIds.length){
      var vRes=await sb.from('service_varianten').select('*').in('service_id',svcIds).eq('aktiv',true).order('sortierung');
      if(vRes.error){console.error('Varianten Fehler:',vRes.error);}else{
        var allVars=vRes.data||[];
        VARIANTEN={};
        allVars.forEach(function(v){
          if(!VARIANTEN[v.service_id])VARIANTEN[v.service_id]=[];
          VARIANTEN[v.service_id].push({
            id:v.id,
            min:v.dauer_minuten,
            preis:parseFloat(v.preis)||0,
            puffer_aktiv:v.puffer_aktiv,
            puffer_minuten:v.puffer_minuten||0
          });
        });
      }
    }
    render(); // neu rendern mit echten Daten
  }catch(err){console.error('loadServices Fehler:',err);}
}
