<!DOCTYPE html>
<html>
<head>
<style>
:root{--tp:#4a1c6b;--tpl:#6b3fa0;--tpp:#f0eaf7;--tg:#c9a84c;--tgl:#e8d08a;--tgp:#fdf8ec;--td:#1a0a2e}
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f2f8;width:100%}
.hd{background:var(--tp);padding:10px 16px}
.hd-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.hd-logo{font-size:9px;letter-spacing:.16em;color:var(--tg);font-weight:500;text-transform:uppercase;margin-bottom:1px}
.hd-name{font-size:15px;font-weight:500;color:#fff;margin-bottom:3px}
.hd-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.hd-chip{font-size:11px;color:rgba(255,255,255,.55);display:flex;align-items:center;gap:4px}
.hd-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.hd-open{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:500;color:#7fe8b0}
.hd-open-dot{width:6px;height:6px;border-radius:50%;background:#7fe8b0}
.hd-hours-pill{background:rgba(255,255,255,.1);border-radius:99px;padding:4px 10px;font-size:11px;color:rgba(255,255,255,.75);white-space:nowrap;cursor:pointer;position:relative;user-select:none}
.hd-hours-pill:hover{background:rgba(255,255,255,.15)}
.hd-hours-drop{position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;padding:10px 14px;min-width:200px;z-index:100;box-shadow:0 4px 16px rgba(74,28,107,.12);display:none}
.hd-hour-row{display:flex;justify-content:space-between;gap:16px;font-size:12px;color:#7a6a8a;padding:3px 0}
.hd-hour-today{color:var(--td);font-weight:500}
.hd-hour-closed{color:#c8bcd8}
.wrap{padding:10px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;padding:13px}
.ctitle{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.cnum{background:var(--tp);color:#fff;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500;flex-shrink:0}

/* Dual toggle */
.dual-tog{display:flex;align-items:center;gap:8px;padding:8px 11px;background:#fff;border:1.5px solid #e8e0f0;border-radius:8px;cursor:pointer;margin-bottom:10px}
.dual-tog.on{border-color:var(--tp);background:var(--tpp)}
.tog-box{width:18px;height:18px;border-radius:4px;border:1.5px solid #c8bcd8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dual-tog.on .tog-box{background:var(--tp);border-color:var(--tp)}
.tog-lbl{font-size:13px;font-weight:500;color:var(--td)}
.tog-sub{font-size:11px;color:#7a6a8a}

/* Service grid */
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}

/* Normale Service-Karte */
.svc{border:1.5px solid #e8e0f0;border-radius:8px;padding:10px 9px;cursor:pointer;position:relative;overflow:hidden;background:#fff}
.svc:hover{border-color:var(--tpl)}
/* Slot 1 allein */
.svc.sel1only{border-color:var(--tp);background:var(--tpp)}
/* Slot 2 allein */
.svc.sel2only{border-color:var(--tg);background:var(--tgp)}
/* Beide — Split: linke Hälfte lila, rechte Hälfte gold */
.svc.selboth{border:none;background:#fff;outline:2px solid var(--tp)}
.svc.selboth::before{content:'';position:absolute;inset:0;left:0;width:50%;background:var(--tpp);z-index:0}
.svc.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.svc-inner{position:relative;z-index:1}
.svc-n{font-size:13px;font-weight:500;color:var(--td);margin-bottom:2px}
.svc-d{font-size:11px;color:#7a6a8a}
.svc-p{font-size:11px;font-weight:500;color:var(--tg);margin-top:5px}
/* Badge für beide */
.svc-badges{display:flex;gap:3px;margin-top:5px;position:relative;z-index:1}
.sbadge-sm{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:500}
.sbadge-1{background:var(--tp);color:#fff}
.sbadge-2{background:var(--tg);color:var(--td)}
/* Next-toggle Indikator */
.svc-next{position:absolute;top:6px;right:7px;font-size:9px;color:rgba(74,28,107,.4);z-index:2}

/* Dauer */
.dur-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.dur{border:1.5px solid #e8e0f0;border-radius:8px;padding:9px 4px;text-align:center;cursor:pointer;position:relative;overflow:hidden;background:#fff}
.dur:hover{border-color:var(--tpl)}
.dur.sel1only{border-color:var(--tp);background:var(--tpp)}
.dur.sel2only{border-color:var(--tg);background:var(--tgp)}
.dur.selboth{border:none;outline:2px solid var(--tp);background:#fff}
.dur.selboth::before{content:'';position:absolute;inset:0;width:50%;background:var(--tpp);z-index:0}
.dur.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.dur-inner{position:relative;z-index:1}
.dur-m{font-size:15px;font-weight:500;color:var(--td)}
.dur-l{font-size:10px;color:#7a6a8a}
.dur-p{font-size:11px;color:var(--tg);font-weight:500;margin-top:3px}

/* Akkordion Mitarbeiter */
.acc-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.acc-hdr-left{display:flex;align-items:center;gap:8px}
.acc-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500}
.acc-current{font-size:12px;color:#7a6a8a}
.acc-arrow{font-size:16px;color:var(--tpl);transition:transform .2s;line-height:1}
.acc-arrow.open{transform:rotate(180deg)}
.acc-body{overflow:hidden;max-height:0;opacity:0;transition:max-height .3s ease,opacity .2s,margin .2s}
.acc-body.open{max-height:600px;opacity:1;margin-top:10px}
.staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px}
.stf{border:1.5px solid #e8e0f0;border-radius:8px;padding:10px 11px;display:flex;align-items:center;gap:9px;cursor:pointer;background:#fff;position:relative;overflow:hidden}
.stf:hover{border-color:var(--tpl)}
.stf.sel1only{border-color:var(--tp);background:var(--tpp)}
.stf.sel2only{border-color:var(--tg);background:var(--tgp)}
.stf.selboth{border:none;outline:2px solid var(--tp);background:#fff}
.stf.selboth::before{content:'';position:absolute;inset:0;width:50%;background:var(--tpp);z-index:0}
.stf.selboth::after{content:'';position:absolute;inset:0;left:50%;width:50%;background:var(--tgp);z-index:0}
.stf-inner{position:relative;z-index:1;display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.av{width:36px;height:36px;border-radius:50%;background:var(--tpp);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--tp);flex-shrink:0}
.av.g{background:var(--tgp);color:#7a5a00}
.stf-n{font-size:13px;font-weight:500;color:var(--td)}
.stf-r{font-size:11px;color:#7a6a8a;margin-top:1px}
.stf-av{font-size:10px;color:#3b7a57;margin-top:2px}
.stf-na{font-size:10px;color:#c8bcd8;margin-top:2px}
.stf-badges{display:flex;gap:3px;position:relative;z-index:1;flex-shrink:0}
.sbadge{width:17px;height:17px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.sb1{background:var(--tp);color:#fff}
.sb2{background:var(--tg);color:var(--td)}

/* Kalender */
.cal-sum-row{display:grid;grid-template-columns:1fr 230px;gap:10px;align-items:start}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.cal-nav{background:none;border:1px solid #e8e0f0;border-radius:6px;padding:2px 9px;cursor:pointer;font-size:14px;color:var(--tp);line-height:1.4}
.cal-nav:hover{background:var(--tpp)}
.cal-mo{font-size:12px;font-weight:500;color:var(--td)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:8px}
.cdl{text-align:center;font-size:9px;color:#7a6a8a;padding:2px 0}
.cd{text-align:center;padding:5px 2px;border-radius:5px;font-size:11px;cursor:pointer;color:var(--td)}
.cd:hover:not(.cp):not(.ce){background:var(--tpp);color:var(--tp)}
.cd.cs{background:var(--tp);color:#fff;font-weight:500}
.cd.ce,.cd.cp{pointer-events:none}
.cd.cp{color:#ccc}
.cd.ct{color:var(--tp);font-weight:500}
.slot-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin:8px 0 5px}
.slots{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.sl{border:1.5px solid #e8e0f0;border-radius:6px;padding:6px 2px;text-align:center;font-size:11px;cursor:pointer;color:var(--td)}
.sl:hover:not(.sb){border-color:var(--tp);color:var(--tp);background:var(--tpp)}
.sl.ss{background:var(--tp);color:#fff;border-color:var(--tp);font-weight:500}
.sl.sb{background:#f5f2f8;color:#ccc;pointer-events:none;font-size:9px}

/* Buchungsübersicht */
.sumcard{background:#fff;border:1.5px solid #e8e0f0;border-radius:10px;overflow:hidden}
.sum-hdr{background:var(--tp);padding:10px 13px}
.sum-hdr-t{font-size:10px;font-weight:500;color:rgba(255,255,255,.7);letter-spacing:.05em;text-transform:uppercase}
.sum-hdr-p{font-size:22px;font-weight:500;color:var(--tg);margin-top:1px}
.sumrow{display:flex;justify-content:space-between;align-items:center;padding:6px 13px;border-bottom:1px solid #f0eaf7;font-size:12px}
.sumrow:last-child{border-bottom:none}
.sl-lbl{color:#7a6a8a}
.sl-val{font-weight:500;color:var(--td);text-align:right}
.sl-val.emp{color:#ccc;font-weight:400}
.contact-block{padding:11px 13px;background:#faf8fc;border-top:1.5px solid #f0eaf7}
.contact-ttl{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--tpl);font-weight:500;margin-bottom:9px}
.field{margin-bottom:8px}
.field label{display:block;font-size:11px;color:#6a5a7a;margin-bottom:3px;font-weight:500}
.field input{width:100%;border:1.5px solid #e8e0f0;border-radius:7px;padding:7px 10px;font-size:12px;color:var(--td);background:#fff;font-family:inherit}
.field input:focus{outline:none;border-color:var(--tp)}
.phone-wrap{display:flex;border:1.5px solid #e8e0f0;border-radius:7px;overflow:visible;background:#fff}
.phone-wrap.ok{border-color:#3b7a57}
.phone-wrap.err{border-color:#d0021b}
.phone-country{display:flex;align-items:center;gap:4px;padding:0 8px;cursor:pointer;background:#faf8fc;border-right:1.5px solid #e8e0f0;position:relative;flex-shrink:0}
.phone-dial{font-size:11px;font-weight:500;color:var(--td)}
.phone-input{flex:1;border:none;outline:none;padding:7px 9px;font-size:12px;color:var(--td);background:transparent;font-family:inherit;min-width:0}
.phone-status{font-size:10px;margin-top:2px}
.phone-status.ok{color:#3b7a57}
.phone-status.err{color:#d0021b}
.phone-status.hint{color:#7a6a8a}
.country-drop{position:absolute;top:calc(100% + 4px);left:-1px;background:#fff;border:1.5px solid #e8e0f0;border-radius:8px;z-index:200;min-width:200px;overflow:hidden;box-shadow:0 4px 16px rgba(74,28,107,.1)}
.country-search{padding:5px 9px;border-bottom:1px solid #f0eaf7}
.country-search input{width:100%;border:none;outline:none;font-size:12px;color:var(--td);font-family:inherit;background:transparent}
.country-list{max-height:150px;overflow-y:auto}
.country-item{display:flex;align-items:center;gap:7px;padding:6px 10px;cursor:pointer;font-size:12px;color:var(--td)}
.country-item:hover,.country-item.sel{background:var(--tpp)}
.book-btn{width:100%;background:var(--tg);border:none;padding:11px;font-size:14px;font-weight:500;color:var(--td);cursor:pointer;font-family:inherit}
.book-btn:hover{background:var(--tgl)}
.book-btn:disabled{background:#e8e0f0;color:#aaa;cursor:not-allowed}
.hint{font-size:10px;color:#7a6a8a;line-height:1.5;margin-top:4px}
.divider{border:none;border-top:1.5px dashed #e8e0f0;margin:10px 0}
.conf{background:var(--tp);border-radius:10px;padding:2.5rem 1.5rem;text-align:center;margin:10px}
.conf-cc{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.conf-t{font-size:17px;font-weight:500;color:#fff;margin-bottom:6px}
.conf-s{font-size:12px;color:rgba(255,255,255,.55);line-height:1.6;margin-bottom:1rem}
.cpill{display:inline-flex;font-size:11px;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.15);color:#fff;margin:2px}
.cpill.g{background:var(--tgp);color:#7a5a00}
.reset-btn{background:none;border:1.5px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 18px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;margin-top:1rem}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-inner">
    <div>
      <div class="hd-logo" id="brand-name">INSY RECEPTION</div>
      <div class="hd-name" id="salon-name">Salonname</div>

      <div class="hd-meta">
        <div class="hd-chip" id="salon-address">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          Adresse
        </div>

        <div class="hd-chip" id="salon-phone">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.79 0 013.07 9.81 19.79 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          Telefonnummer
        </div>
      </div>
    </div>

    <div class="hd-right">
      <div class="hd-open"><div class="hd-open-dot"></div>Heute geöffnet</div>
      <div class="hd-hours-pill" id="hours-pill" onclick="toggleHours()">
        09:00 – 19:00 ▾
        <div class="hd-hours-drop" id="hours-drop">
          <div class="hd-hour-row"><span>Montag</span><span>09:00 – 19:00</span></div>
          <div class="hd-hour-row hd-hour-today"><span>Dienstag</span><span>09:00 – 19:00</span></div>
          <div class="hd-hour-row"><span>Mittwoch</span><span>09:00 – 19:00</span></div>
          <div class="hd-hour-row"><span>Donnerstag</span><span>09:00 – 20:00</span></div>
          <div class="hd-hour-row"><span>Freitag</span><span>09:00 – 20:00</span></div>
          <div class="hd-hour-row"><span>Samstag</span><span>10:00 – 17:00</span></div>
          <div class="hd-hour-row hd-hour-closed"><span>Sonntag</span><span>Geschlossen</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="wrap" id="app"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const sb = window.supabase.createClient(
    'https://uzemgxfjgjwqfgfwbboi.supabase.co',
    'sb_publishable__XubcF5yPDyIMpfE7kO9Rg_Xp7kj0hL'
  );

  function getSalonId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('salon_id');
  }

  async function loadSalonProfile() {
    try {
      const salonId = getSalonId();

      if (!salonId) {
        console.warn('Keine salon_id in der URL gefunden.');
        return;
      }

      const { data, error } = await sb
        .from('kunden_profile')
        .select('*')
        .eq('id', salonId)
        .single();

      if (error) {
        console.error('Supabase Fehler:', error);
        return;
      }

      console.log('Salon Profil:', data);

      const salonName = data.brand_name || data.name || 'Salonname';
      const salonPhone = data.phone || 'Telefonnummer';
      const salonAddress = [
        [data.street, data.house_number].filter(Boolean).join(' '),
        [data.postal_code, data.city].filter(Boolean).join(' ')
      ].filter(Boolean).join(', ') || 'Adresse';

      const brandEl = document.getElementById('brand-name');
      const nameEl = document.getElementById('salon-name');
      const phoneEl = document.getElementById('salon-phone');
      const addressEl = document.getElementById('salon-address');

      if (brandEl) brandEl.textContent = 'INSY RECEPTION';
      if (nameEl) nameEl.textContent = salonName;

      if (phoneEl) {
        phoneEl.innerHTML = `
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.79 0 013.07 9.81 19.79 19.79 0 01.4 1.18 2 2 0 012.18 1h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 8.15a16 16 0 006.94 6.94l1.41-1.41a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
          </svg>
          ${salonPhone}
        `;
      }

      if (addressEl) {
        addressEl.innerHTML = `
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          ${salonAddress}
        `;
      }
    } catch (err) {
      console.error('JS Fehler:', err);
    }
  }

  loadSalonProfile();
</script>
</body>
</html>
